<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
    {% block head %}{% endblock %}
</head>
<body class="bg-[#F8FAFC] text-[#001E00]">
    <nav class="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-black text-[#001E00]">COBOT<span class="text-[#3751FF]">TOOLING</span></a>
            <div class="hidden md:flex space-x-8 font-bold text-sm uppercase tracking-wider">
                <a href="/" class="hover:text-[#3751FF]">Home</a>
                <a href="/affiliate-disclosure.html" class="hover:text-[#3751FF]">Disclosures</a>
                <a href="#" class="bg-[#9FE870] px-4 py-2 rounded text-[#001E00]">Expert Consult</a>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="bg-[#001E00] text-white py-16 px-6 mt-20">
        <div class="max-w-7xl mx-auto text-center">
            <p class="mb-4">  2026 CobotTooling. Expert-vetted automation solutions.</p>
            <div class="flex justify-center space-x-4 text-xs text-slate-400">
                <a href="/privacy-policy.html">Privacy</a>
                <a href="/affiliate-disclosure.html">Affiliates</a>
            </div>
        </div>
    </footer>

</html>
