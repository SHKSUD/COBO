{% extends "base.html" %}
{% block content %}
<main class="max-w-7xl mx-auto py-20 px-6">
    <div class="grid lg:grid-cols-2 gap-16 items-center">
        <div>
            <h1 class="text-6xl font-black leading-tight mb-6">Stop Breakage. <br><span class="text-[#3751FF]">Start Scaling.</span></h1>
            <p class="text-xl text-slate-600 mb-8">Professional-grade end-effectors for every robotic challenge. Expert-tested for precision and safety.</p>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-2xl border border-slate-100">
            <label class="block text-xs font-black uppercase text-slate-400 mb-4">Select Your Production Problem:</label>
            <select id="problemSelector" class="w-full p-4 border-2 border-slate-200 rounded-xl mb-8 font-bold text-lg focus:border-[#3751FF] outline-none" onchange="updateWidget()">
                {% for p in products %}
                <option value="{{ p.Problem_ID }}" data-tool="{{ p.Tool_Name }}" data-rate="{{ p.Success_Rate }}" data-cost="{{ p.Monthly_Cost }}">
                    {{ p.Pain_Point }}
                </option>
                {% endfor %}
            </select>

            <div id="resultBox" class="bg-[#F8FAFC] p-6 rounded-2xl border-2 border-dashed border-slate-200 text-center">
                <h3 id="toolName" class="text-2xl font-black mb-2 text-[#3751FF]">---</h3>
                <div class="flex justify-around mb-6">
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase">Success Rate</p>
                        <p id="toolRate" class="text-3xl font-black text-[#9FE870]">--%</p>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase">Monthly Cost</p>
                        <p id="toolCost" class="text-3xl font-black text-[#001E00]">$--</p>
                    </div>
                </div>
                <button id="ctaBtn" class="w-full bg-[#3751FF] text-white py-4 rounded-xl font-black text-xl hover:scale-[1.02] transition-transform">Get Expert Pricing</button>
            </div>
        </div>
    </div>
</main>

<script>
function updateWidget() {
    const s = document.getElementById('problemSelector');
    const opt = s.options[s.selectedIndex];
    document.getElementById('toolName').innerText = opt.dataset.tool;
    document.getElementById('toolRate').innerText = opt.dataset.rate;
    document.getElementById('toolCost').innerText = opt.dataset.cost;
    document.getElementById('ctaBtn').onclick = () => window.location.href = '/solution/' + s.value + '.html';
}
window.onload = updateWidget;
</script>
{% endblock %}
